name: MikeGira — Security Scan & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  # ── 1. SECRET DETECTION ──────────────────────────────────────────────
  secret-scan:
    name: Secret Detection (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks — detect hardcoded secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. STATIC CODE ANALYSIS ──────────────────────────────────────────
  code-scan:
    name: SAST — CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ── 3. CONFIRM VERCEL DEPLOYMENT ────────────────────────────────────
  confirm-deploy:
    name: Confirm Vercel Deployment
    needs: [secret-scan, code-scan]
    runs-on: ubuntu-latest
    steps:
      - name: Security gate passed
        run: |
          echo "✅ Secret scan passed"
          echo "✅ CodeQL analysis passed"
          echo "🚀 Vercel auto-deployed from push to main"
          echo "🌐 Live at: https://bio-two-eta.vercel.app"
          echo "📅 $(date -u)"

      - name: Smoke test — verify site is live
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://bio-two-eta.vercel.app)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Site returned $STATUS"
            exit 1
          fi
          echo "✅ Site returning 200 OK"
