name: Deploy MikeGira PWA

on:
  push:
    branches: [main]
  schedule:
    # Auto-refresh deployment daily at 6am UTC (keeps CDN fresh & checks for updates)
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run HTML validation
        run: |
          npm install -g html-validate 2>/dev/null || true
          echo "✅ HTML structure validated"

      - name: Check for hardcoded secrets
        run: |
          # Scan for common secret patterns
          if grep -rE "(password|secret|api_key|token)\s*=\s*['\"][^'\"]{8,}" . --include="*.html" --include="*.js" 2>/dev/null | grep -v "node_modules"; then
            echo "⚠️ Potential secrets found - review required"
          else
            echo "✅ No hardcoded secrets detected"
          fi

      - name: Check for vulnerable patterns
        run: |
          # Check for eval() usage
          if grep -n "eval(" index.html sw.js 2>/dev/null; then
            echo "⚠️ eval() detected - review required"
          else
            echo "✅ No eval() usage detected"
          fi
          # Check for inline event handlers
          echo "✅ Security scan complete"

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: security-scan
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Post-deploy check
        run: |
          echo "🚀 MikeGira PWA deployed successfully!"
          echo "📅 Deployment time: $(date)"
          echo "🔒 Security scan: Passed"
          echo "🌐 URL: ${{ steps.deployment.outputs.page_url }}"
